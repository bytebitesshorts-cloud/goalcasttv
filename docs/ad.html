<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Goal Cast Ad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Loading spinner while ad loads */
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader"></div>

  <!-- Ad Script -->
  <script>
    // Hide loader once ad script has had time to render
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
      }, 2000);
    });
  </script>
  <script src="https://pl29753506.effectivecpmnetwork.com/0a/e1/d7/0ae1d79a1bf2c4b91f8bb6a90a64be9c.js"></script>
</body>
</html>
