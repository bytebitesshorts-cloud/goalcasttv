name: Build GoalCast Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Also allows manual trigger from GitHub website

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔑 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ Build Android APK (Preview)
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: ✅ Build submitted!
        run: echo "Build submitted to EAS! Check https://expo.dev for download link."
